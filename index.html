<style>
:root {
  --blue-50: #eff6ff;
  --blue-100: #dbeafe;
  --blue-200: #bfdbfe;
  --blue-300: #93c5fd;
  --blue-500: #3b82f6;
  --blue-600: #2563eb;
  --blue-700: #1d4ed8;
  --blue-800: #1e40af;
  --blue-900: #1e3a8a;
  --slate-50: #f8fafc;
  --slate-100: #f1f5f9;
  --slate-200: #e2e8f0;
  --slate-300: #cbd5e1;
  --slate-400: #94a3b8;
  --slate-500: #64748b;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1e293b;
  --yellow-50: #fefce8;
  --yellow-200: #fef08a;
  --yellow-400: #facc15;
  --yellow-500: #eab308;
  --yellow-600: #ca8a04;
  --yellow-700: #a16207;
  --red-500: #ef4444;
  --red-600: #dc2626;
  --green-500: #22c55e;
  --green-600: #16a34a;
  --green-200: rgba(34,197,94,.25);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--slate-50);
  color: var(--slate-800);
  font-family: 'Nunito', 'Segoe UI', Tahoma, sans-serif;
}

.app-wrap {
  min-height: 100vh;
  padding: 12px;
}
@media (min-width: 640px) { .app-wrap { padding: 16px; } }
@media (min-width: 768px) { .app-wrap { padding: 32px; } }

.container {
  max-width: 1024px;
  margin: 0 auto;
  padding-bottom: 96px;
}

/* Header */
.header-card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  background: #fff;
  padding: 16px;
  border-radius: 24px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  border: 1px solid var(--slate-100);
}
@media (min-width: 768px) {
  .header-card { flex-direction: row; padding: 24px; margin-bottom: 32px; }
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
@media (min-width: 640px) { .header-left { gap: 16px; } }

.header-logo {
  width: 48px;
  height: 48px;
  object-fit: contain;
  flex-shrink: 0;
}
@media (min-width: 640px) { .header-logo { width: 64px; height: 64px; } }

.header-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--blue-900);
  margin: 0 0 4px 0;
}
@media (min-width: 640px) { .header-title { font-size: 24px; } }
@media (min-width: 768px) { .header-title { font-size: 30px; margin-bottom: 8px; } }

.header-sub {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  color: var(--slate-500);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 0;
}
@media (min-width: 640px) { .header-sub { font-size: 18px; } }

.week-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #fde68a, #fca5a5);
  color: #7c2d12;
  padding: 4px 12px;
  border-radius: 999px;
  font-weight: 800;
  text-transform: none;
  letter-spacing: normal;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  animation: badgeWiggle 2.6s ease-in-out infinite;
}
@keyframes badgeWiggle {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
.week-emoji {
  display: inline-block;
  animation: badgeBounce 1.1s ease-in-out infinite;
}
@keyframes badgeBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.btn-refresh {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--blue-600);
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 16px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(37,99,235,0.25);
  transition: all 0.15s ease;
  width: 100%;
}
@media (min-width: 640px) { .btn-refresh { padding: 12px 24px; font-size: 18px; } }
@media (min-width: 768px) { .btn-refresh { width: auto; } }
.btn-refresh:hover { background: var(--blue-700); }
.btn-refresh:active { transform: scale(0.97); }

/* Tabs */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}
@media (min-width: 640px) { .tabs { margin-bottom: 32px; } }

.tab-btn {
  flex: 1 1 140px;
  min-width: 140px;
  text-align: center;
  padding: 12px 16px;
  border-radius: 16px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  background: #fff;
  color: var(--slate-500);
  border: 2px solid var(--slate-200);
  transition: all 0.15s ease;
}
@media (min-width: 640px) { .tab-btn { padding: 16px 24px; font-size: 18px; min-width: 150px; } }
.tab-btn:hover { border-color: var(--blue-200); background: var(--slate-50); }
.tab-btn.active {
  background: var(--blue-100);
  color: var(--blue-800);
  border-color: var(--blue-300);
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

/* Home */
.home-card {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  border: 1px solid var(--slate-100);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  animation: fadeIn 0.3s ease-out forwards;
}
@media (min-width: 640px) { .home-card { padding: 40px; } }

.home-logo {
  width: 100%;
  max-width: 340px;
  margin-top: 32px;
  object-fit: contain;
}
@media (min-width: 640px) { .home-logo { max-width: 420px; margin-top: 40px; } }
@media (min-width: 768px) { .home-logo { max-width: 480px; } }

.home-hero {
  width: 100%;
  max-width: 720px;
  border-radius: 20px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  margin-bottom: 24px;
  object-fit: cover;
}
@media (min-width: 640px) { .home-hero { margin-bottom: 32px; border-radius: 24px; } }

.home-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.6;
  margin-bottom: 28px;
  max-width: 680px;
  word-break: keep-all;
  overflow-wrap: normal;
  hyphens: none;
}
@media (min-width: 640px) { .home-text { font-size: 26px; margin-bottom: 36px; } }
@media (min-width: 768px) { .home-text { font-size: 30px; } }

.word-wrap {
  display: inline-block;
  white-space: nowrap;
}

.letter-pop {
  display: inline-block;
  color: var(--blue-700);
  opacity: 0;
  transform: translateY(6px);
  animation: letterPop 0.35s ease forwards;
}
@keyframes letterPop {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

.btn-start {
  background: var(--blue-600);
  color: #fff;
  border: none;
  padding: 14px 32px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(37,99,235,0.2);
  transition: all 0.15s ease;
}
@media (min-width: 640px) { .btn-start { padding: 16px 40px; font-size: 24px; } }
.btn-start:hover { background: var(--blue-700); transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37,99,235,0.25); }
.btn-start:active { transform: scale(0.97); }

/* Problem cards */
.problem-list { margin-bottom: 48px; }

.problem-card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  border: 1px solid var(--slate-200);
  padding: 16px;
  margin-bottom: 20px;
  transition: box-shadow 0.15s ease;
}
@media (min-width: 640px) { .problem-card { padding: 20px; } }
.problem-card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.08); }

.problem-row {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: flex-start;
}
.problem-row.non-word {
  align-items: stretch;
}
@media (min-width: 1024px) {
  .problem-row.non-word {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
}

.problem-main {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex: 1;
}
@media (min-width: 640px) { .problem-main { gap: 16px; } }
@media (min-width: 768px) { .problem-main { align-items: center; } }

.problem-index {
  background: var(--blue-100);
  color: var(--blue-700);
  font-weight: 700;
  border-radius: 999px;
  width: 36px;
  height: 36px;
  min-width: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-top: 4px;
}
@media (min-width: 640px) { .problem-index { width: 40px; height: 40px; min-width: 40px; font-size: 18px; margin-top: 0; } }

.problem-text {
  font-size: 20px;
  font-weight: 500;
  color: var(--slate-700);
  line-height: 1.5;
}
@media (min-width: 640px) { .problem-text { font-size: 24px; } }

.problem-expr {
  font-family: 'Courier New', monospace;
  letter-spacing: 0.05em;
  font-size: 24px;
  color: var(--slate-800);
}
@media (min-width: 640px) { .problem-expr { font-size: 30px; } }
.problem-expr .op { color: var(--blue-500); font-weight: 700; }

.problem-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
}
.problem-controls.word-controls {
  background: var(--slate-50);
  padding: 12px;
  border-radius: 16px;
  border: 1px solid var(--slate-200);
  width: 100%;
}
@media (min-width: 768px) { .problem-controls.word-controls { width: auto; } }

.op-select {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
@media (min-width: 640px) { .op-select { flex-direction: row; margin-right: 16px; } }

.op-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--slate-400);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.op-buttons {
  display: flex;
  gap: 4px;
  background: #fff;
  padding: 4px;
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  border: 1px solid var(--slate-200);
}

.op-btn {
  width: 42px;
  height: 42px;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  border-radius: 8px;
  border: none;
  background: #fff;
  color: var(--slate-600);
  cursor: pointer;
  transition: all 0.15s ease;
}
@media (min-width: 640px) { .op-btn { width: 48px; height: 48px; font-size: 28px; } }
.op-btn:hover { background: var(--blue-50); }
.op-btn.active {
  background: var(--blue-500);
  color: #fff;
  box-shadow: 0 4px 8px rgba(59,130,246,0.3);
  transform: scale(1.05);
}

.answer-group {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.answer-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--slate-400);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-right: 4px;
}

.answer-input {
  width: 90px;
  height: 48px;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  border: 2px solid var(--slate-300);
  border-radius: 12px;
  outline: none;
  transition: all 0.15s ease;
  font-family: inherit;
}
@media (min-width: 640px) { .answer-input { width: 112px; height: 56px; font-size: 28px; } }
.answer-input:focus {
  border-color: var(--blue-500);
  box-shadow: 0 0 0 4px var(--blue-100);
}
.answer-input::-webkit-inner-spin-button,
.answer-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

.feedback-slot {
  width: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 30px;
}

.joker-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  border: 2px solid var(--slate-200);
  background: #fff;
  color: var(--slate-400);
  cursor: pointer;
  transition: all 0.15s ease;
}
@media (min-width: 640px) { .joker-btn { width: 56px; height: 56px; } }
.joker-btn:hover { border-color: var(--yellow-400); color: var(--yellow-600); background: var(--yellow-50); }
.joker-btn.active {
  background: #fef9c3;
  border-color: var(--yellow-400);
  color: var(--yellow-600);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
}

/* Joker panel */
.joker-wrap {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--slate-100);
  animation: fadeIn 0.3s ease-out forwards;
  overflow-x: auto;
}
.joker-hint {
  margin-bottom: 12px;
  font-size: 16px;
  color: var(--blue-800);
  font-weight: 500;
}
@media (min-width: 640px) { .joker-hint { font-size: 18px; } }

.joker-box {
  display: inline-block;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.joker-box.yellow { background: var(--yellow-50); border: 1px solid var(--yellow-200); }
.joker-box.blue { background: var(--blue-50); border: 1px solid var(--blue-200); }

.joker-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 8px;
}
.joker-box.yellow .joker-title { color: var(--yellow-700); }
.joker-box.blue .joker-title { color: var(--blue-800); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }

/* Vertical add/sub joker */
.vjoker {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  font-family: 'Courier New', monospace;
  font-size: 22px;
  letter-spacing: 0.1em;
  line-height: 2;
}
.vjoker-row { display: flex; gap: 6px; justify-content: flex-end; width: 100%; }
.vjoker-digit { width: 36px; text-align: center; position: relative; border-radius: 6px; }
.vjoker-digit.borrow-toggle {
  cursor: pointer;
  transition: background 0.15s ease;
}
.vjoker-digit.borrow-toggle:hover { background: rgba(250, 204, 21, 0.25); }
.vjoker-digit.borrow-toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  right: 4px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red-500);
  opacity: 0;
  transform: scale(0.4);
  transition: all 0.15s ease;
}
.vjoker-digit.borrow-toggle.has-dot::after {
  opacity: 1;
  transform: scale(1);
}
.vjoker-hint {
  margin-top: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--yellow-700);
  text-align: right;
  width: 100%;
}
.vjoker-line { border-bottom: 3px solid var(--slate-700); padding-bottom: 6px; position: relative; }
.vjoker-op { position: absolute; left: -18px; }
.vjoker input {
  width: 36px;
  text-align: center;
  border: 2px solid var(--slate-300);
  border-radius: 6px;
  font-weight: 700;
  font-family: inherit;
  font-size: 16px;
  outline: none;
}
.vjoker input.small-top {
  height: 36px;
  border-color: var(--yellow-400);
  background: #fff;
  color: var(--blue-600);
}
.vjoker input.ans-box {
  height: 44px;
  font-size: 20px;
}
.vjoker input:focus { border-color: var(--blue-500); }

/* Multiplication joker */
.mjoker {
  min-width: 200px;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  font-size: 20px;
  line-height: 2;
}
.mjoker-carry {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 16px;
  color: var(--slate-600);
  font-family: inherit;
}
.mjoker-carry input {
  width: 42px;
  height: 36px;
  text-align: center;
  font-size: 18px;
  border: 2px solid var(--yellow-400);
  border-radius: 6px;
  background: #fff;
  color: var(--blue-600);
  font-weight: 700;
  outline: none;
}
.mjoker-num { letter-spacing: 0.4em; width: 100%; text-align: right; padding-right: 8px; font-size: 26px; }
.mjoker-line { letter-spacing: 0.4em; border-bottom: 3px solid var(--slate-700); width: 100%; display: flex; justify-content: space-between; padding-right: 8px; font-size: 26px; }
.mjoker-ans {
  margin-top: 8px;
  width: 100%;
  padding: 8px;
  text-align: right;
  border: 2px solid var(--slate-300);
  border-radius: 8px;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.1em;
  outline: none;
  font-family: inherit;
}
.mjoker-ans:focus { border-color: var(--blue-500); }

/* Division joker */
.djoker {
  display: inline-block;
}
.djoker-grid {
  display: grid;
  grid-template-columns: 22px 40px 40px 22px 40px 22px 40px 40px;
  column-gap: 6px;
  row-gap: 10px;
  align-items: center;
  font-family: 'Courier New', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--slate-700);
}
.djoker-grid .cell { text-align: center; }
.djoker-grid .minus { color: var(--red-500); text-align: right; }
.djoker-grid input {
  width: 38px;
  height: 44px;
  text-align: center;
  font-size: 20px;
  border: 2px solid var(--slate-300);
  border-radius: 6px;
  background: #fff;
  font-weight: 700;
  outline: none;
  font-family: inherit;
  color: var(--slate-800);
  justify-self: center;
}
.djoker-grid input:focus { border-color: var(--blue-500); }
.djoker-grid input.q { color: var(--blue-700); }
.djoker-grid input.s { color: var(--red-600); }
.djoker-grid input.r2 { color: var(--green-600); }
.djoker-line {
  border-bottom: 3px solid var(--slate-700);
  height: 0;
  align-self: end;
  margin-bottom: 4px;
}
.djoker-remainder-label {
  font-size: 13px;
  color: var(--slate-400);
  text-align: left;
  padding-left: 8px;
  align-self: center;
}

/* Done button */
.done-wrap { text-align: center; margin-top: 48px; padding-bottom: 48px; }
.btn-done {
  background: var(--green-500);
  color: #fff;
  border: none;
  padding: 14px 32px;
  border-radius: 24px;
  font-weight: 800;
  font-size: 20px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 10px 20px var(--green-200);
  transition: all 0.15s ease;
}
@media (min-width: 640px) { .btn-done { padding: 16px 40px; font-size: 24px; } }
.btn-done:hover { background: var(--green-600); }
.btn-done:active { transform: scale(0.97); }

/* Резултат по карти */
.problem-card.card-correct {
  border-color: var(--green-500);
  box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
}
.problem-card.card-incorrect {
  border-color: var(--red-500);
  box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
}

/* Модал със статистика */
.stats-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 200;
  animation: fadeIn 0.2s ease-out forwards;
}
.stats-modal {
  background: #fff;
  border-radius: 28px;
  padding: 32px 24px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  animation: statsPop 0.25s ease-out forwards;
}
@keyframes statsPop {
  from { opacity: 0; transform: scale(0.9) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.stats-emoji { font-size: 56px; line-height: 1; margin-bottom: 8px; }
.stats-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--slate-800);
  margin: 0 0 20px;
}
@media (min-width: 640px) { .stats-title { font-size: 26px; } }
.stats-bar-track {
  background: var(--slate-100);
  border-radius: 999px;
  height: 16px;
  overflow: hidden;
  margin-bottom: 8px;
}
.stats-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue-500), var(--green-500));
  border-radius: 999px;
  transition: width 0.7s ease;
}
.stats-percent {
  font-weight: 800;
  font-size: 18px;
  color: var(--blue-700);
  margin: 0 0 14px;
}
.stats-message {
  color: var(--slate-600);
  font-size: 16px;
  font-weight: 600;
  margin: 0 0 6px;
}
.stats-sub {
  color: var(--slate-400);
  font-size: 14px;
  margin: 0 0 8px;
}
.stats-actions {
  display: flex;
  gap: 12px;
  margin-top: 22px;
  flex-wrap: wrap;
  justify-content: center;
}
.btn-stats-primary, .btn-stats-secondary {
  flex: 1;
  min-width: 140px;
  padding: 12px 20px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  border: none;
  transition: all 0.15s ease;
}
.btn-stats-primary { background: var(--blue-600); color: #fff; }
.btn-stats-primary:hover { background: var(--blue-700); }
.btn-stats-secondary { background: var(--slate-100); color: var(--slate-700); }
.btn-stats-secondary:hover { background: var(--slate-200); }

/* Fixed corner logo */
.corner-logo {
  position: fixed;
  bottom: 12px;
  right: 12px;
  width: 40px;
  height: 40px;
  object-fit: contain;
  opacity: 0.9;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  pointer-events: none;
  user-select: none;
  z-index: 40;
}
@media (min-width: 640px) { .corner-logo { width: 56px; height: 56px; bottom: 16px; right: 16px; } }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounceShort {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px) scale(1.3); }
}
.fx-bounce { display: inline-block; animation: bounceShort 0.5s ease-in-out; }
@keyframes shake {
  0%, 100% { transform: translateX(0) rotate(0); }
  25% { transform: translateX(-6px) rotate(-10deg); }
  75% { transform: translateX(6px) rotate(10deg); }
}
.fx-shake { display: inline-block; animation: shake 0.4s ease-in-out; }

</style>
</head>

<script>
// ==================== Утилити ====================
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

const getSymbol = (op) => {
  if (op === '*') return '·';
  if (op === '/') return ':';
  return op;
};

const ICONS = {
  lightbulb: '<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>',
  check: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>',
  refresh: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"/><path d="M21 12A9 9 0 0 0 6 5.3L3 8"/><path d="M21 22v-6h-6"/><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/></svg>'
};

// ==================== Генериране на задачи ====================
function generateProblems() {
  const r1 = [
    { id: 'r1_1', type: '+', num1: rand(20, 80), num2: rand(15, 45) },
    { id: 'r1_2', type: '+', num1: rand(120, 500), num2: rand(100, 490) },
    { id: 'r1_3', type: '-', num1: rand(60, 99), num2: rand(15, 50) },
    { id: 'r1_4', type: '-', num1: rand(300, 999), num2: rand(120, 290) },
    { id: 'r1_5', type: 'mixed', num1: rand(250, 450), num2: rand(100, 200), typeStr: '+' }
  ];

  r1[0].num2 = (10 - (r1[0].num1 % 10)) + rand(1, 5) + rand(1, 3) * 10;
  r1[2].num2 = (r1[2].num1 % 10) + rand(1, 5) + rand(1, 3) * 10;

  r1.forEach(p => {
    p.ans = (p.type === 'mixed' ? p.typeStr : p.type) === '+' ? p.num1 + p.num2 : p.num1 - p.num2;
  });

  const r2 = [
    { id: 'r2_1', type: '*', num1: rand(6, 9), num2: rand(4, 9) },
    { id: 'r2_2', type: '*', num1: rand(12, 45), num2: rand(2, 5) },
    { id: 'r2_3', type: '*', num1: rand(112, 234), num2: rand(2, 4) },
    { id: 'r2_4', type: '/', num1: rand(5, 49) * 2, num2: 2 },
    { id: 'r2_5', type: '/', num1: 0, num2: 0 }
  ];

  const divisor = rand(2, 5);
  const q = rand(11, 19);
  r2[4].num2 = divisor;
  r2[4].num1 = q * divisor;

  r2.forEach(p => {
    p.ans = p.type === '*' ? p.num1 * p.num2 : Math.floor(p.num1 / p.num2);
  });

  const w1_n1 = rand(120, 250), w1_n2 = rand(30, 80);
  const w2_n1 = rand(70, 99), w2_n2 = rand(35, 55);
  const w3_n1 = rand(8, 12), w3_n2 = rand(3, 6);
  const w4_n2 = rand(4, 8), w4_n1 = rand(4, 8) * w4_n2;

  const r3 = [
    { id: 'r3_1', type: 'word', text: `В библиотеката има ${w1_n1} книги. Донесли още ${w1_n2} книги. Колко книги има общо?`, op: '+', num1: w1_n1, num2: w1_n2, ans: w1_n1 + w1_n2 },
    { id: 'r3_2', type: 'word', text: `Мария има ${w2_n1} лв. Купува раница за ${w2_n2} лв. Колко лева ѝ остават?`, op: '-', num1: w2_n1, num2: w2_n2, ans: w2_n1 - w2_n2 },
    { id: 'r3_3', type: 'word', text: `В една кутия има ${w3_n1} флумастера. Колко флумастера има в ${w3_n2} такива кутии?`, op: '*', num1: w3_n1, num2: w3_n2, ans: w3_n1 * w3_n2 },
    { id: 'r3_4', type: 'word', text: `${w4_n1} бонбона се разпределят поравно между ${w4_n2} деца. По колко бонбона получава всяко дете?`, op: '/', num1: w4_n1, num2: w4_n2, ans: Math.floor(w4_n1 / w4_n2) }
  ];

  return { r1, r2, r3 };
}

// ==================== Състояние ====================
let PROBLEMS = { r1: [], r2: [], r3: [] };
let activeTab = 'home';
const userOps = {}; // id -> избран символ ('+','-','·',':')

// ==================== Помощни за joker панели ====================
function verticalJokerHTML(id, num1, num2, type) {
  const s1 = String(num1), s2 = String(num2);
  const maxLen = Math.max(s1.length, s2.length);
  const p1 = s1.padStart(maxLen, ' ');
  const p2 = s2.padStart(maxLen, ' ');
  const topCount = maxLen;
  const ansCount = maxLen + (type === '+' ? 1 : 0);
  const isSub = type === '-';

  let topInputs = '';
  for (let i = 0; i < topCount; i++) {
    topInputs += `<input type="text" maxlength="2" class="small-top" />`;
  }
  let digits1 = '';
  for (const ch of p1) {
    const clickable = isSub && ch !== ' ';
    digits1 += `<div class="vjoker-digit${clickable ? ' borrow-toggle' : ''}">${ch === ' ' ? '&nbsp;' : ch}</div>`;
  }
  let digits2 = '';
  for (const ch of p2) digits2 += `<div class="vjoker-digit">${ch === ' ' ? '&nbsp;' : ch}</div>`;
  let ansInputs = '';
  for (let i = 0; i < ansCount; i++) {
    ansInputs += `<input type="text" maxlength="1" class="ans-box" />`;
  }

  const hint = isSub
    ? `<div class="vjoker-hint">Кликни върху цифра, ако ѝ „заемаш“ единица</div>`
    : '';

  return `
    <div class="joker-box yellow">
      <div class="joker-title">Помощно поле (Жокер)</div>
      <div class="vjoker">
        <div class="vjoker-row">${topInputs}</div>
        <div class="vjoker-row">${digits1}</div>
        <div class="vjoker-row vjoker-line"><span class="vjoker-op">${type}</span>${digits2}</div>
        <div class="vjoker-row" style="margin-top:8px;">${ansInputs}</div>
      </div>
      ${hint}
    </div>`;
}

function multiplicationJokerHTML(num1, num2) {
  return `
    <div class="joker-box yellow">
      <div class="joker-title">Помощно поле (Умножение)</div>
      <div class="mjoker">
        <div class="mjoker-carry">Наум: <input type="text" /></div>
        <div class="mjoker-num">${num1}</div>
        <div class="mjoker-line"><span>·</span><span>${num2}</span></div>
        <input type="text" class="mjoker-ans" />
      </div>
    </div>`;
}

function divisionJokerHTML(num1, num2) {
  const s = String(num1);
  const d1 = s[0] || '';
  const d2 = s[1] || '';
  return `
    <div class="joker-box blue">
      <div class="joker-title">Деление с опашка</div>
      <div class="djoker">
        <div class="djoker-grid">
          <div class="cell" style="grid-column:2; grid-row:1;">${d1}</div>
          <div class="cell" style="grid-column:3; grid-row:1;">${d2}</div>
          <div class="cell" style="grid-column:4; grid-row:1;">:</div>
          <div class="cell" style="grid-column:5; grid-row:1;">${num2}</div>
          <div class="cell" style="grid-column:6; grid-row:1;">=</div>
          <input type="text" maxlength="1" class="q" style="grid-column:7; grid-row:1;" />
          <input type="text" maxlength="1" class="q" style="grid-column:8; grid-row:1;" />

          <div class="minus" style="grid-column:1; grid-row:2;">-</div>
          <input type="text" maxlength="1" class="s" style="grid-column:2; grid-row:2;" />

          <div class="djoker-line" style="grid-column:2; grid-row:3;"></div>

          <input type="text" maxlength="1" style="grid-column:2; grid-row:4;" />
          <input type="text" maxlength="1" style="grid-column:3; grid-row:4;" />

          <div class="minus" style="grid-column:1; grid-row:5;">-</div>
          <input type="text" maxlength="1" class="s" style="grid-column:2; grid-row:5;" />
          <input type="text" maxlength="1" class="s" style="grid-column:3; grid-row:5;" />

          <div class="djoker-line" style="grid-column:2 / span 2; grid-row:6;"></div>

          <input type="text" maxlength="1" class="r2" style="grid-column:3; grid-row:7;" />
          <div class="djoker-remainder-label" style="grid-column:4 / span 5; grid-row:7;">← остатък</div>
        </div>
      </div>
    </div>`;
}

function jokerPanelHTML(p) {
  const effectiveType = p.type === 'word' ? p.op : (p.type === 'mixed' ? p.typeStr : p.type);
  let inner = '';
  if (effectiveType === '+' || effectiveType === '-') {
    inner = verticalJokerHTML(p.id, p.num1, p.num2, effectiveType);
  } else if (effectiveType === '*') {
    inner = multiplicationJokerHTML(p.num1, p.num2);
  } else if (effectiveType === '/') {
    inner = divisionJokerHTML(p.num1, p.num2);
  }
  const hint = p.type === 'word'
    ? `<div class="joker-hint">💡 Използвай числата от задачата, за да пресметнеш по-лесно тук:</div>`
    : '';
  return `<div class="joker-wrap" style="display:none;">${hint}${inner}</div>`;
}

// ==================== Рендиране на задача ====================
function renderProblemCard(p, index) {
  const card = document.createElement('div');
  card.className = 'problem-card';
  card.dataset.id = p.id;

  const isWord = p.type === 'word';

  const row = document.createElement('div');
  row.className = 'problem-row' + (isWord ? '' : ' non-word');

  // --- Основен текст/израз ---
  const main = document.createElement('div');
  main.className = 'problem-main';

  const indexBubble = document.createElement('div');
  indexBubble.className = 'problem-index';
  indexBubble.textContent = index + 1;
  main.appendChild(indexBubble);

  const textWrap = document.createElement('div');
  if (isWord) {
    textWrap.className = 'problem-text';
    textWrap.textContent = p.text;
  } else {
    textWrap.className = 'problem-expr';
    const sym = getSymbol(p.type === 'mixed' ? p.typeStr : p.type);
    textWrap.innerHTML = `${p.num1} <span class="op">${sym}</span> ${p.num2} = `;
  }
  main.appendChild(textWrap);
  row.appendChild(main);

  // --- Контроли ---
  const controls = document.createElement('div');
  controls.className = 'problem-controls' + (isWord ? ' word-controls' : '');

  if (isWord) {
    const opSelect = document.createElement('div');
    opSelect.className = 'op-select';
    opSelect.innerHTML = `<span class="op-label">Действие:</span>`;
    const opButtons = document.createElement('div');
    opButtons.className = 'op-buttons';
    ['+', '-', '·', ':'].forEach(sym => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'op-btn';
      btn.textContent = sym;
      btn.addEventListener('click', () => {
        userOps[p.id] = sym;
        opButtons.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateFeedback(p, card);
      });
      opButtons.appendChild(btn);
    });
    opSelect.appendChild(opButtons);
    controls.appendChild(opSelect);
  }

  const answerGroup = document.createElement('div');
  answerGroup.className = 'answer-group';
  if (isWord) {
    const lbl = document.createElement('span');
    lbl.className = 'answer-label';
    lbl.textContent = 'Отговор:';
    answerGroup.appendChild(lbl);
  }

  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'answer-input';
  input.placeholder = '?';
  input.addEventListener('input', () => updateFeedback(p, card));
  answerGroup.appendChild(input);

  const feedbackSlot = document.createElement('div');
  feedbackSlot.className = 'feedback-slot';
  answerGroup.appendChild(feedbackSlot);

  const jokerBtn = document.createElement('button');
  jokerBtn.type = 'button';
  jokerBtn.className = 'joker-btn';
  jokerBtn.title = 'Покажи помощно поле за пресмятане';
  jokerBtn.innerHTML = ICONS.lightbulb;
  answerGroup.appendChild(jokerBtn);

  controls.appendChild(answerGroup);
  row.appendChild(controls);
  card.appendChild(row);

  // --- Joker панел ---
  const jokerHolder = document.createElement('div');
  jokerHolder.innerHTML = jokerPanelHTML(p);
  const jokerEl = jokerHolder.firstElementChild;
  card.appendChild(jokerEl);

  jokerEl.querySelectorAll('.borrow-toggle').forEach(digitEl => {
    digitEl.addEventListener('click', () => {
      digitEl.classList.toggle('has-dot');
    });
  });

  jokerBtn.addEventListener('click', () => {
    const isOpen = jokerEl.style.display !== 'none';
    jokerEl.style.display = isOpen ? 'none' : 'block';
    jokerBtn.classList.toggle('active', !isOpen);
  });

  return card;
}

function updateFeedback(p, card) {
  const input = card.querySelector('.answer-input');
  const feedbackSlot = card.querySelector('.feedback-slot');
  const ansVal = input.value;

  feedbackSlot.innerHTML = '';
  feedbackSlot.className = 'feedback-slot';

  const showEmoji = (emoji, effect) => {
    const span = document.createElement('span');
    span.className = effect;
    span.textContent = emoji;
    feedbackSlot.appendChild(span);
  };

  if (p.type === 'word') {
    const op = userOps[p.id];
    const correctSym = getSymbol(p.op);
    if (!op && (!ansVal || ansVal === '')) return;

    if (op && ansVal !== undefined && ansVal !== '') {
      if (op === correctSym && Number(ansVal) === p.ans) {
        showEmoji('🌟', 'fx-bounce');
      } else {
        showEmoji('🤔', 'fx-shake');
      }
    } else if (op) {
      if (op === correctSym) {
        showEmoji('👍', 'fx-bounce');
      } else {
        showEmoji('🤔', 'fx-shake');
      }
    }
  } else {
    if (ansVal === undefined || ansVal === '') return;
    if (Number(ansVal) === p.ans) {
      showEmoji('🌟', 'fx-bounce');
    } else {
      showEmoji('🤔', 'fx-shake');
    }
  }
}

// ==================== Рендиране на раздели ====================
function renderProblemList(container, list) {
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'problem-list';
  list.forEach((p, i) => wrap.appendChild(renderProblemCard(p, i)));
  container.appendChild(wrap);

  const doneWrap = document.createElement('div');
  doneWrap.className = 'done-wrap';
  doneWrap.innerHTML = `<button type="button" class="btn-done">${ICONS.check} Готов съм!</button>`;
  doneWrap.querySelector('.btn-done').addEventListener('click', () => showStats(list));
  container.appendChild(doneWrap);
}

function evaluateProblem(p) {
  const card = document.querySelector(`.problem-card[data-id="${p.id}"]`);
  if (!card) return 'unanswered';
  const input = card.querySelector('.answer-input');
  const ansVal = input.value;

  if (p.type === 'word') {
    const op = userOps[p.id];
    const correctSym = getSymbol(p.op);
    if (!op && (!ansVal || ansVal === '')) return 'unanswered';
    if (op === correctSym && ansVal !== '' && Number(ansVal) === p.ans) return 'correct';
    return 'incorrect';
  }
  if (ansVal === undefined || ansVal === '') return 'unanswered';
  return Number(ansVal) === p.ans ? 'correct' : 'incorrect';
}

function showStats(list) {
  let correct = 0, incorrect = 0, unanswered = 0;

  list.forEach(p => {
    const result = evaluateProblem(p);
    const card = document.querySelector(`.problem-card[data-id="${p.id}"]`);
    if (card) {
      card.classList.remove('card-correct', 'card-incorrect');
      if (result === 'correct') card.classList.add('card-correct');
      else if (result === 'incorrect') card.classList.add('card-incorrect');
    }
    if (result === 'correct') correct++;
    else if (result === 'incorrect') incorrect++;
    else unanswered++;
  });

  const total = list.length;
  const percent = total > 0 ? Math.round((correct / total) * 100) : 0;

  let emoji, message;
  if (correct === total) {
    emoji = '🏆';
    message = 'Отлично! Всички отговори са верни!';
  } else if (percent >= 70) {
    emoji = '🎉';
    message = 'Много добре! Продължавай все така!';
  } else if (percent >= 40) {
    emoji = '💪';
    message = 'Добро начало! Пробвай отново с помощта на жокерите.';
  } else {
    emoji = '📚';
    message = 'Не се отказвай! Използвай жокерите, за да си помогнеш.';
  }

  const overlay = document.createElement('div');
  overlay.className = 'stats-overlay';
  overlay.innerHTML = `
    <div class="stats-modal">
      <div class="stats-emoji">${emoji}</div>
      <h2 class="stats-title">${correct} от ${total} правилни отговора</h2>
      <div class="stats-bar-track"><div class="stats-bar-fill" id="statsBarFill" style="width:0%"></div></div>
      <p class="stats-percent">${percent}%</p>
      <p class="stats-message">${message}</p>
      ${unanswered > 0 ? `<p class="stats-sub">Непопълнени отговори: ${unanswered}</p>` : ''}
      <div class="stats-actions">
        <button type="button" class="btn-stats-secondary" id="statsCloseBtn">Затвори</button>
        <button type="button" class="btn-stats-primary" id="statsNewBtn">Нови задачи</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const animateFill = () => {
    const fill = document.getElementById('statsBarFill');
    if (fill) fill.style.width = percent + '%';
  };
  if (typeof requestAnimationFrame === 'function') {
    requestAnimationFrame(animateFill);
  } else {
    setTimeout(animateFill, 20);
  }

  const close = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('#statsCloseBtn').addEventListener('click', close);
  overlay.querySelector('#statsNewBtn').addEventListener('click', () => {
    close();
    generateNew();
  });
}

const WELCOME_TEXT = 'Здравей! Избери рубрика от менюто горе или натисни бутона по-долу, за да започнеш решаването на задачите. Ако се затрудниш, не забравяй да използваш жокерите с крушката 💡!';

function animateLetters(el, text) {
  el.innerHTML = '';
  let beat = 0;
  const words = text.split(' ');
  words.forEach((word, wi) => {
    const wordSpan = document.createElement('span');
    wordSpan.className = 'word-wrap';
    for (const ch of word) {
      const span = document.createElement('span');
      span.textContent = ch;
      span.className = 'letter-pop';
      span.style.animationDelay = (beat * 0.035) + 's';
      wordSpan.appendChild(span);
      beat++;
    }
    el.appendChild(wordSpan);
    if (wi < words.length - 1) {
      el.appendChild(document.createTextNode(' '));
    }
  });
}

function renderHome(container) {
  container.innerHTML = `
    <div class="home-card">
      <img src="${window.HERO_IMAGE}" alt="Математика за 4. клас" class="home-hero" />
      <p class="home-text" id="welcomeText"></p>
      <button type="button" class="btn-start" id="startBtn">Започни теста</button>
      <img src="${window.BIG_LOGO}" alt="Интерактивна Математика" class="home-logo" />
    </div>`;
  animateLetters(document.getElementById('welcomeText'), WELCOME_TEXT);
  document.getElementById('startBtn').addEventListener('click', () => setActiveTab('r1'));
}

// ==================== Табове ====================
function setActiveTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  const content = document.getElementById('content');
  if (tab === 'home') {
    renderHome(content);
  } else {
    renderProblemList(content, PROBLEMS[tab]);
  }
}

function generateNew() {
  PROBLEMS = generateProblems();
  Object.keys(userOps).forEach(k => delete userOps[k]);
  setActiveTab(activeTab === 'home' ? 'home' : activeTab);
}

// ==================== Инициализация ====================
function initApp() {
  document.getElementById('headerLogo').src = window.SMALL_LOGO;
  document.getElementById('cornerLogo').src = window.SMALL_LOGO;

  document.getElementById('refreshBtn').innerHTML = `${ICONS.refresh} Нови Задачи`;
  document.getElementById('refreshBtn').addEventListener('click', generateNew);

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => setActiveTab(btn.dataset.tab));
  });

  PROBLEMS = generateProblems();
  setActiveTab('home');
}

document.addEventListener('DOMContentLoaded', initApp);

</script>
